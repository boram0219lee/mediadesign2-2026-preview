<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작품 — Creatures of Sense</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --bg: #F6F5F0;
      --surface: #FFFFFF;
      --text: #111111;
      --muted: #73736E;
      --line: #DAD9D3;
      --accent: #007A53;
      --page-width: 1280px;
      --page-padding: 48px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 20px var(--page-padding);
      border-bottom: 1px solid var(--line);
      background: rgba(246, 245, 240, 0.94);
    }

    .back-btn {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--text); }
    .back-btn::before { content: '←'; font-size: 15px; }

    .nav-counter {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
    }

    .work-header {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 48px var(--page-padding) 36px;
      width: 100%;
    }

    .work-title {
      font-size: clamp(42px, 4.4vw, 68px);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 1.06;
      margin-bottom: 18px;
      color: var(--text);
      max-width: 1120px;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .artist-name {
      font-size: 16px;
      line-height: 1.5;
      color: var(--muted);
      margin-bottom: 38px;
      font-weight: 400;
    }

    .work-info-table {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      column-gap: 38px;
      row-gap: 22px;
      max-width: 1120px;
    }

    .info-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.8;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .info-text {
      font-size: 17px;
      line-height: 1.82;
      color: #4F4F49;
      font-weight: 400;
      word-break: keep-all;
      white-space: pre-line;
    }

    .viewer-section {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 0 var(--page-padding);
      width: 100%;
    }

    .viewer-meta {
      min-height: 28px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    .meta-summary {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
      text-align: right;
    }

    .meta-summary span {
      display: inline-block;
      color: var(--muted);
    }

    .meta-summary .dot {
      color: var(--line);
    }

    .embed-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #000;
    }

    .embed-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    .local-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #000;
    }

    .local-wrap iframe {
      display: block;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1280px;
      height: 720px;
      border: none;
      transform-origin: center center;
      background: #000;
    }

    .notice-box {
      width: 100%;
      aspect-ratio: 16/9;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--surface);
    }

    .notice-icon { font-size: 40px; line-height: 1; }
    .notice-text { text-align: center; padding: 0 24px; }
    .notice-text p { font-size: 15px; color: var(--text); margin-bottom: 6px; font-weight: 600; }
    .notice-text span { font-size: 13px; color: var(--muted); line-height: 1.6; }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .open-btn:hover { background: var(--accent); }
    .open-btn::after { content: '↗'; }

    .guide-box {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 20px var(--page-padding) 0;
      width: 100%;
    }

    .guide-inner {
      border-top: 1px solid var(--line);
      padding-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 48px;
      row-gap: 20px;
      font-size: 14px;
      line-height: 1.72;
    }

    .guide-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .guide-text {
      color: #555550;
      word-break: keep-all;
      white-space: pre-line;
    }

    .work-nav {
      max-width: var(--page-width);
      margin: 46px auto 68px;
      padding: 32px var(--page-padding) 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      border-top: none;
    }

    .work-nav::before {
      content: '';
      position: absolute;
      top: 0;
      left: var(--page-padding);
      right: var(--page-padding);
      border-top: 1px solid var(--line);
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      max-width: 280px;
    }

    .nav-btn.prev { align-items: flex-start; }
    .nav-btn.next { align-items: flex-end; text-align: right; }
    .nav-btn .nav-direction { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .nav-btn .nav-work-title { font-size: 14px; color: var(--text); font-weight: 500; }
    .nav-btn .nav-work-name { font-size: 12px; color: var(--muted); }
    .nav-btn:hover .nav-work-title { color: var(--accent); }
    .nav-placeholder { width: 200px; }

    @media (max-width: 1200px) {
      :root { --page-padding: 40px; }
      .work-info-table { grid-template-columns: 150px minmax(0, 1fr); column-gap: 32px; }
    }

    @media (max-width: 760px) {
      :root { --page-padding: 24px; }
      nav { padding-top: 18px; padding-bottom: 18px; }
      .work-header { padding-top: 34px; padding-bottom: 28px; }
      .work-title { font-size: 38px; margin-bottom: 16px; }
      .artist-name { margin-bottom: 28px; }
      .work-info-table { grid-template-columns: 1fr; row-gap: 8px; }
      .info-label { font-size: 14px; margin-top: 16px; }
      .info-text { font-size: 15px; line-height: 1.75; }
      .viewer-meta { justify-content: flex-start; text-align: left; margin-top: 4px; }
      .meta-summary { justify-content: flex-start; text-align: left; }
      .guide-inner { grid-template-columns: 1fr; row-gap: 20px; }
      .work-nav { margin-top: 38px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="back-btn">목록으로</a>
    <span class="nav-counter" id="nav-counter"></span>
  </nav>

  <div class="work-header">
    <h1 class="work-title" id="work-title"></h1>
    <p class="artist-name" id="artist-name"></p>

    <div class="work-info-table">
      <div class="info-label">감각 출발점</div>
      <div class="info-text" id="sense-text"></div>

      <div class="info-label">작품 설명</div>
      <div class="info-text" id="description-text"></div>
    </div>
  </div>

  <div class="viewer-section">
    <div class="viewer-meta" id="viewer-meta"></div>
    <div id="canvas-area"></div>
  </div>

  <div class="guide-box" id="guide-box"></div>
  <div class="work-nav" id="work-nav"></div>

  <script src="data.js"></script>
  <script>
    const CANVAS_W = 1280;
    const CANVAS_H = 720;

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'), 10) || 0;
    const work = works[id];

    if (!work) window.location.href = 'index.html';

    document.title = `${work.title} — Creatures of Sense`;
    document.getElementById('work-title').textContent = work.title || '';
    document.getElementById('artist-name').textContent = work.name || '';
    document.getElementById('sense-text').textContent = work.sense || '';
    document.getElementById('description-text').textContent = work.description || '';
    document.getElementById('nav-counter').textContent = `${id + 1} / ${works.length}`;

    const viewerMeta = document.getElementById('viewer-meta');
    const metaParts = [];
    if (work.inputDevice) metaParts.push(work.inputDevice);
    if (work.inputAction) metaParts.push(work.inputAction);
    if (work.output) metaParts.push(work.output);

    viewerMeta.innerHTML = metaParts.length
      ? `<div class="meta-summary">${metaParts.map((part, i) => `${i > 0 ? '<span class="dot">·</span>' : ''}<span>${part}</span>`).join('')}</div>`
      : '';

    const canvas = document.getElementById('canvas-area');
    const mode = work.displayMode || 'embed';

    if (mode === 'local') {
      canvas.innerHTML = `
        <div class="local-wrap" id="local-wrap">
          <iframe
            id="work-iframe"
            src="${work.link}"
            allow="autoplay; fullscreen; camera; microphone"
            allowfullscreen
            loading="lazy"
            title="${work.title}"
          ></iframe>
        </div>
      `;

      function fitLocalIframe() {
        const wrap = document.getElementById('local-wrap');
        const iframe = document.getElementById('work-iframe');

        const scale = Math.min(
          wrap.clientWidth / CANVAS_W,
          wrap.clientHeight / CANVAS_H
        );

        iframe.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      window.addEventListener('resize', fitLocalIframe);
      document.getElementById('work-iframe').addEventListener('load', fitLocalIframe);
      setTimeout(fitLocalIframe, 100);
    } else if (mode === 'embed') {
      canvas.innerHTML = `
        <div class="embed-wrap">
          <iframe
            id="work-iframe"
            src="${work.link}"
            allow="autoplay; fullscreen; camera; microphone"
            allowfullscreen
            loading="lazy"
            title="${work.title}"
          ></iframe>
        </div>
      `;
    } else {
      const icon = (work.rawInput || '').includes('웹캠') ? '📷' : (work.rawInput || '').includes('기타') ? '🎸' : '↗';
      const title = (work.rawInput || '').includes('웹캠')
        ? '웹캠을 사용하는 작품입니다'
        : '새 탭에서 여는 작품입니다';
      const desc = (work.rawInput || '').includes('웹캠')
        ? '새 탭에서 열면 카메라 권한을 허용할 수 있습니다.'
        : '작품 특성상 새 탭에서 여는 방식을 권장합니다.';
      canvas.innerHTML = `
        <div class="notice-box">
          <div class="notice-icon">${icon}</div>
          <div class="notice-text">
            <p>${title}</p>
            <span>${desc}</span>
          </div>
          <a href="${work.link}" target="_blank" rel="noopener" class="open-btn">작품 열기</a>
        </div>
      `;
    }

    const guideRows = [];
    if (work.interactionGuide) guideRows.push(['Interaction', work.interactionGuide]);
    if (work.outputGuide) guideRows.push(['Output', work.outputGuide]);

    document.getElementById('guide-box').innerHTML = guideRows.length
      ? `<div class="guide-inner">${guideRows.map(([label, text]) => `<div><div class="guide-label">${label}</div><div class="guide-text">${text}</div></div>`).join('')}</div>`
      : '';

    const nav = document.getElementById('work-nav');
    const prev = id > 0 ? works[id - 1] : null;
    const next = id < works.length - 1 ? works[id + 1] : null;

    let navHTML = '';
    if (prev) {
      navHTML += `
        <a href="work.html?id=${id - 1}" class="nav-btn prev">
          <span class="nav-direction">← 이전 작품</span>
          <span class="nav-work-title">${prev.title}</span>
          <span class="nav-work-name">${prev.name}</span>
        </a>
      `;
    } else {
      navHTML += `<div class="nav-placeholder"></div>`;
    }

    if (next) {
      navHTML += `
        <a href="work.html?id=${id + 1}" class="nav-btn next">
          <span class="nav-direction">다음 작품 →</span>
          <span class="nav-work-title">${next.title}</span>
          <span class="nav-work-name">${next.name}</span>
        </a>
      `;
    } else {
      navHTML += `<div class="nav-placeholder"></div>`;
    }

    nav.innerHTML = navHTML;
  </script>
</body>
</html>
